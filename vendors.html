<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>
  (function(){
    var PASSWORD="UCLAPhysics",KEY="contractsAccess";
    if(sessionStorage.getItem(KEY)!=="granted"){
      document.documentElement.style.visibility="hidden";
      document.addEventListener("DOMContentLoaded",function(){
        var o=document.createElement("div");
        o.style.cssText="position:fixed;top:0;left:0;width:100%;height:100%;background:#0f1923;display:flex;align-items:center;justify-content:center;z-index:99999;font-family:Inter,sans-serif;visibility:visible";
        o.innerHTML='<div style="max-width:380px;width:90%;text-align:center;padding:40px 30px"><div style="color:#F5A623;font-size:18px;font-weight:700;letter-spacing:0.05em;margin-bottom:24px">LAUSD CONTRACT WATCH</div><h2 style="color:white;font-size:20px;font-weight:600;margin-bottom:8px">Restricted Access</h2><p style="color:rgba(255,255,255,0.6);font-size:13px;line-height:1.6;margin-bottom:28px">This database is currently under fact-checking review. If you have received access credentials, enter them below.<br><br><a href="mailto:lausdcontractwatch@gmail.com" style="color:#F5A623">Request access \u2192</a></p><input id="pwInput" type="password" placeholder="Enter password" style="width:100%;box-sizing:border-box;padding:12px 16px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);border-radius:6px;color:white;font-size:15px;margin-bottom:12px;outline:none"/><div id="pwError" style="color:#ff6b6b;font-size:12px;margin-bottom:12px;display:none">Incorrect password. Email lausdcontractwatch@gmail.com for access.</div><button id="pwSubmit" style="width:100%;padding:12px;background:#F5A623;border:none;border-radius:6px;color:#0f1923;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:20px">Access Database</button><a href="/" style="color:rgba(255,255,255,0.4);font-size:13px;text-decoration:none;display:block;margin-bottom:12px">\u2190 Return to main site</a><a href="/about.html" style="color:rgba(255,255,255,0.3);font-size:12px;text-decoration:none">About this project</a></div>';
        document.body.appendChild(o);
        document.documentElement.style.visibility="visible";
        function check(){var v=document.getElementById("pwInput").value;if(v===PASSWORD){sessionStorage.setItem(KEY,"granted");o.remove();document.documentElement.style.visibility="visible"}else{document.getElementById("pwError").style.display="block";document.getElementById("pwInput").value=""}}
        document.getElementById("pwSubmit").addEventListener("click",check);
        document.getElementById("pwInput").addEventListener("keypress",function(e){if(e.key==="Enter")check()});
      });
    }
  })();
  </script>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vendor Analysis — LAUSD Contract Watch</title>
  <meta name="description" content="LAUSD vendors ranked by total contract spending.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap">
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>

<div class="page-header">
  <div class="container">
    <h1>Vendor Analysis</h1>
    <p>LAUSD vendors ranked by total contract value.</p>
  </div>
</div>

<section class="section">
  <div class="container">

    <div class="tabs">
      <a href="#" class="tab tab-active" data-tab="active">Active Contracts <span class="tab-badge" id="activeCount">—</span></a>
      <a href="#" class="tab" data-tab="all">All Vendors <span class="tab-badge" id="allCount">—</span></a>
    </div>

    <div class="results-summary" id="vendorSummary">Loading…</div>

    <div class="contracts-table-wrap">
      <table class="contracts-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Vendor</th>
            <th>Contracts</th>
            <th class="col-right">Total Value</th>
            <th>Categories</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="vendorsTbody">
          <tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--text-muted)">Loading…</td></tr>
        </tbody>
      </table>
    </div>

  </div>
</section>

<script src="/js/layout.js"></script>
<script src="/js/vendors.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
