<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Contracts — LAUSD Contract Watch</title>
  <meta name="description" content="Search and filter all LAUSD contracts by vendor, category, amount, and status.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap">
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>

<div class="page-header">
  <div class="container">
    <h1>Search Contracts</h1>
    <p>Browse all 244 LAUSD contracts approved by the board.</p>
  </div>
</div>

<section class="section">
  <div class="container">

    <!-- Filters -->
    <div class="search-filters">
      <div class="filter-row">
        <div class="filter-group filter-main">
          <label for="searchInput">Search</label>
          <input type="text" id="searchInput" class="search-input" placeholder="Contract title, vendor, keyword…">
        </div>
        <div class="filter-group">
          <label for="filterCategory">Category</label>
          <select id="filterCategory">
            <option value="">All Categories</option>
            <option>Technology</option>
            <option>Facilities</option>
            <option>Transportation</option>
            <option>Food Services</option>
            <option>Professional Services</option>
            <option>Construction</option>
            <option>Consulting</option>
            <option>Curriculum</option>
            <option>Special Education</option>
            <option>Security</option>
            <option>Maintenance</option>
            <option>Other</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="filterStatus">Status</label>
          <select id="filterStatus">
            <option value="">All Statuses</option>
            <option>Active</option>
            <option>Expired</option>
            <option>Pending</option>
            <option>Cancelled</option>
            <option>Amended</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="filterSort">Sort By</label>
          <select id="filterSort">
            <option value="amount_desc">Amount (High → Low)</option>
            <option value="amount_asc">Amount (Low → High)</option>
            <option value="date_desc">Date (Newest)</option>
            <option value="date_asc">Date (Oldest)</option>
            <option value="vendor">Vendor A–Z</option>
            <option value="title">Title A–Z</option>
          </select>
        </div>
      </div>
      <div class="filter-row filter-advanced">
        <div class="filter-group">
          <label for="filterAmountMin">Min Amount ($)</label>
          <input type="number" id="filterAmountMin" placeholder="0" min="0">
        </div>
        <div class="filter-group">
          <label for="filterAmountMax">Max Amount ($)</label>
          <input type="number" id="filterAmountMax" placeholder="No limit" min="0">
        </div>
        <div class="filter-group">
          <label for="filterFinding">Finding Level</label>
          <select id="filterFinding">
            <option value="">All</option>
            <option value="significant">Red Flag</option>
            <option value="medium">Questions Raised</option>
            <option value="minor">Monitor</option>
            <option value="none">Appears Legitimate</option>
          </select>
        </div>
        <div class="filter-group" style="display:flex;align-items:flex-end">
          <button class="btn btn-outline" id="btnClearFilters">Clear Filters</button>
        </div>
      </div>
    </div>

    <!-- Results Summary -->
    <div class="results-summary" id="resultsSummary">Loading contracts…</div>

    <!-- Table -->
    <div class="contracts-table-wrap">
      <table class="contracts-table" id="contractsTable">
        <thead>
          <tr>
            <th>Contract</th>
            <th>Vendor</th>
            <th>Category</th>
            <th class="col-right">Amount</th>
            <th>Status</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody id="contractsTbody">
          <tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--text-muted)">Loading…</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div class="pagination" id="pagination"></div>

  </div>
</section>

<script src="/js/layout.js"></script>
<script src="/js/search.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
